name: Jira Issue Sync

on:
  issues:
    types: [opened, closed, deleted, reopened]
  issue_comment:
    types: [created]

# Caller for local Jira issue sync. Jira writes use the inherited Jira API
# token; default GITHUB_TOKEN only needs read.
permissions:
  contents: read
  issues: read

jobs:
  call-workflow:
    uses: ./.github/workflows/jira-issue-sync.yml
    with:
      project: TF
      issue-extra-fields: |
        { "customfield_10091": ["TF-Core-Cloud"],
          "customfield_10008": "${{ contains(github.event.issue.labels.*.name, 'bug') && 'TF-7331' || 'TF-3484' }}"
        }
    secrets: inherit
